<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttle-To-Do-List</title>
    <style>
            
           
            header{
    text-align:center;
    padding:30px;

    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("bike.jpg");

    background-size:cover;
    background-position:center;

    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(255,0,0,0.2);
}

/* Body */

body{
    background-color:#0f0f0f;
    color:white;
    font-family:Segoe UI, sans-serif;
    line-height:1.6;
    padding:20px;
    
  
    color:white;
    font-family: Sedoe UI,sans-serif;
    line-height:1.6;
    min-height: 100vh;
}

/* Header */



header h1{
    color:#ff3b3b;
    font-size:3rem;
    letter-spacing:4px;
}

header p{
    color:#cfcfcf;
    margin-top:10px;
}

/* Sections */

section{
    background:#1b1b1b;
    padding:20px;
    margin:20px 0;
    border-radius:12px;
    box-shadow:0 0 10px rgba(255,255,255,0.05);
}

section h2{
    color:#ff3b3b;
    margin-bottom:15px;
}

/* Labels */

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

/* Inputs */

input,
select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    font-size:16px;
}

/* Button */

button{
    width:100%;
    padding:14px;
    background:#ff3b3b;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1a1a;
    transform:scale(1.02);
}

/* Dashboard */

section p{
    margin:8px 0;
}

/* Lists */

ul{
    list-style:none;
}

li{
    background:#2a2a2a;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

/* Footer */

footer{
    text-align:center;
    margin-top:30px;
    padding:20px;
    color:#aaaaaa;
}

/* Horizontal Line */

hr{
    border:none;
    height:1px;
    background:#333;
    margin:20px 0;
}

/* Responsive */



    header h1{
        font-size:2rem;
    }

    body{
        padding:10px;
    }
    .score-animate {
    transition: all 0.3s ease;
    transform: scale(1.3);
    color: #ff3b3b;
}

.progress-container{
    width:100%;
    height:20px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
}

#progressBar{
    width:0%;
    height:100%;
    background:#ff3b3b;
    transition:0.5s;
}</style>
</head>
<body>
    <!--website header-->
    <header>
         <h1>THROTTLE</h1>
        <p>Plan your rides.Chase your goals</p>
        
        
        
    </header>
    
    <!--task input form-->
     <section>

        <h2>Add New Task</h2>
    <label>Taske Name</label>
    <input id="missionInput" type="text" placeholder="Enter Task">
    <br><br>
    <!--Due Date-->
    <label>Due Date</label>
   <input type="date" id="deadLine">
   <br><br>
   <!--priority-->
    <label>Priority</label>
      <select id="myPriority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <br><br>
    <!--category-->
    <label>Category</label>
      
    <select id="selectCategory">
        <option>Study</option>
        <option>Travel</option>
        <option>Work</option>
        <option>Personal</option>
    </select>

    <br><br>
     
    <!--Add Task Button-->
    <button id="escalateTask"  >Add Task</button>
</section>
<hr>
<!--Dash-Board Section-->
<section>
    <h2>Dashboard</h2>
    <p>XP Earned: <span id="xpCount">0</span></p>
    <p>Total Tasks: <span id="totalCount">0</span></p>
<p>Completed Tasks: <span id="completedCount">0</span></p>
<p>Pending Tasks: <span id="pendingCount">0</span></p>
<div class="progress-container">
    <div id="progressBar"></div>
</div>
</section>

<hr>

    <!-- Pending Tasks -->
    <section>

        <h2>Pending Tasks</h2>

        <ul id="pendingMissions">
            <!-- Tasks will appear here -->
        </ul>

    </section>

    <hr>

    <!-- Completed Tasks -->
    <section>

        <h2>Completed Tasks</h2>

        <ul id="missionSuccessful">
            <!-- Completed tasks will appear here -->
        </ul>

    </section>

    <!-- Footer -->
    <footer>

        <p>Discipline Today, Freedom Tomorrow.</p>

    </footer>
    <script>
        const progressBar = document.querySelector("#progressBar");
        const xpCount = document.querySelector("#xpCount");

let xp = 0;
        let totalTasks = 0;
let completedTasks = 0;
let pendingTasks = 0;

function animate(element){
    element.classList.add("score-animate");

    setTimeout(() => {
        element.classList.remove("score-animate");
    },300);
}

function updateBoard(){

    totalCount.textContent = totalTasks;
    completedCount.textContent = completedTasks;
    pendingCount.textContent = pendingTasks;

    // Progress Bar Update
    let progress = 0;

    if(totalTasks > 0){
        progress = (completedTasks / totalTasks) * 100;
    }

    progressBar.style.width = progress + "%";

    animate(totalCount);
    animate(completedCount);
    animate(pendingCount);
    progressBar.style.width = progress + "%";
progressBar.textContent = Math.round(progress) + "%";
}
        
        

const missionInput = document.querySelector("#missionInput");
const escalateTask = document.querySelector("#escalateTask");
const pendingMissions = document.querySelector("#pendingMissions");
const deadLine = document.querySelector("#deadLine");
const myPriority = document.querySelector("#myPriority");
const selectCategory = document.querySelector("#selectCategory");
const missionSuccessful = document.querySelector("#missionSuccessful");
const totalCount = document.querySelector("#totalCount");
const completedCount = document.querySelector("#completedCount");
const pendingCount = document.querySelector("#pendingCount");


escalateTask.addEventListener("click",function(){
    const taskText = missionInput.value;
    

   
       
               
    if (taskText ==="") {
    alert("Fuel the ride with a mission first.");

    return;
}
 const li = document.createElement("li");
 
  
 
 const dueDate = deadLine.value;
const priority = myPriority.value;
const category = selectCategory.value;


const button = document.createElement("button");
li.innerHTML = `
<strong>${taskText}</strong><br>
📅 ${dueDate}<br>
⚡ ${priority}<br>
🏷️ ${category}<br><br>
`;
if(priority === "High"){
    li.style.borderLeft = "5px solid red";
}
else if(priority === "Medium"){
    li.style.borderLeft = "5px solid orange";
}
else{
    li.style.borderLeft = "5px solid lime";
}
button.textContent = "Complete";
li.appendChild(button);
pendingMissions.appendChild(li);
missionInput.value = "";
deadLine.value = "";
myPriority.selectedIndex = 0;
selectCategory.selectedIndex = 0;


totalTasks++;
pendingTasks++;
updateBoard();

button.addEventListener("click", function(){

    missionSuccessful.appendChild(li);
    
    completedTasks++;
    pendingTasks--;

    xp += 10;

    xpCount.textContent = xp;

    updateBoard();

    animate(xpCount);

    button.remove();
});});
</script>

</body>
</html>
